<html>

<head>
    <title>Happy Birthday</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- LOADER -->
    <div id="loader" class="loader">
        <div class="loader-content">
            <div class="loader-stars">✨✨✨</div>
            <div class="loader-subtitle">A special day awaits...</div>
            <button id="play">Start</button>
        </div>
    </div>

    <!-- AUDIO -->
    <audio class="song" loop style="display: none;">
        <source src="music.mp3">
    </audio>

    <!-- PHASE 1: CAKE SCENE -->
    <div id="scene-cake" class="scene-cake">
        <canvas id="confetti"></canvas>
        <div class="cake-scene-inner">
            <div class="banner-wrap">
                <img src="img/banner.png" alt="Happy Birthday">
            </div>
            <div class="name-wrap">
                <div id="name" class="area">Pumpkin</div>
            </div>
            <div class="cake-wrap">
                <img src="img/cake.gif" alt="Birthday Cake">
            </div>
        </div>
        <img src="img/Balloon-Border.png" class="balloon-border">

        <div id="scroll-prompt" class="scroll-prompt">
            <div>Scroll Down</div>
            <div class="scroll-arrow">↓</div>
        </div>
    </div>

    <!-- PHASE 2: LETTER SCENE -->
    <div id="scene-letter" class="scene-letter">
        <div class="paper-container">
            <div id="paper" class="paper">
                <div class="pinned-pic">
                    <div class="pin"></div>
                    <img src="Happy Birthday_files/bday_img.jpg" class="pinned-photo" alt="Birthday Photo">
                </div>
                <div class="letter-content">
                    <div class="letter-salutation">Happy Birthday!</div>
                    <div class="type-wrap">
                        <div id="typed-strings" class="typing" style="display: none;">
                            <p>Dont let bad experiences let you down.<br>Be who you are.<br>stay safe and stay beautiful.<br>I hope you have a great day and a great year ahead. 
                                                        <br> -Your brother.
                            </p>
                        </div>
                        <span id="typed" style="white-space:pre-wrap;"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="https://unpkg.com/magic-snowflakes/dist/snowflakes.min.js"></script>
<script src="js/jquery.js"></script>
<script src="js/typed.min.js"></script>
<script src="js/script.js"></script>

</html>
